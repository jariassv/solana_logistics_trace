services:
  postgres:
    image: postgres:16-alpine
    container_name: logistics-trace-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: logistics_trace
      POSTGRES_USER: logistics_user
      POSTGRES_PASSWORD: logistics_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logistics_user -d logistics_trace"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
